<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Preview — Highlight Table + Histograms (no Tableau needed)</title>
  <link rel="stylesheet" href="./src/style.css" />
</head>
<body>
  <div id="viz"></div>
  <button id="cfg-open" title="Configure" aria-label="Configure">&#9881;</button>
  <div id="cfg-overlay" hidden>
    <div id="cfg-modal" role="dialog" aria-modal="true" aria-label="Chart settings">
      <header id="cfg-head">
        <span id="cfg-title">Settings</span>
        <div class="cfg-head-actions">
          <button id="cfg-reset" type="button">Reset</button>
          <button id="cfg-done" type="button">Done</button>
        </div>
      </header>
      <div id="cfg-body"></div>
    </div>
  </div>

  <!-- ============================================================
       MOCK of the Tableau Extensions API for local preview only.
       Feeds sample Year x Month x Sales data so you can iterate on
       the chart + config modal without opening Tableau.
       (index.html is what Tableau actually loads — not this file.)
       ============================================================ -->
  <script>
    (function () {
      const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      const YEARS = [2014, 2015, 2016, 2017];
      // A little structured noise so the matrix + both histograms vary.
      function val(y, mi) {
        const yearBase = { 2014: 0.55, 2015: 0.72, 2016: 0.85, 2017: 1.15 }[y];
        const seasonal = 0.8 + 0.7 * Math.abs(Math.sin((mi + 2) * 0.9));
        const jitter = 0.85 + ((y * 7 + mi * 13) % 11) / 30;
        return Math.round(38000 * yearBase * seasonal * jitter);
      }
      const columns = [
        { fieldName: 'Year', dataType: 'integer' },
        { fieldName: 'Month', dataType: 'string' },
        { fieldName: 'SUM(Sales)', dataType: 'float' },
      ];
      const data = [];
      YEARS.forEach((y) => MONTHS.forEach((m, mi) => {
        const v = val(y, mi);
        data.push([
          { value: y, formattedValue: String(y) },
          { value: m, formattedValue: m },
          { value: v, formattedValue: String(v) },
        ]);
      }));

      const settingsStore = {};
      window.tableau = {
        TableauEventType: { SummaryDataChanged: 'summary-data-changed' },
        SelectOptions: { Simple: 'select-options-simple', Toggle: 'select-options-toggle' },
        extensions: {
          initializeAsync: () => Promise.resolve(),
          settings: {
            get: (k) => settingsStore[k],
            set: (k, v) => { settingsStore[k] = v; },
            saveAsync: () => Promise.resolve(),
          },
          worksheetContent: {
            worksheet: {
              name: 'Sales by Year & Month (preview)',
              addEventListener: () => {},
              // Tooltip / selection are no-ops here (no real Tableau), but
              // present so the wiring runs without errors during preview.
              hoverTupleAsync: (id, tip) => { console.log('hoverTupleAsync', id, tip); return Promise.resolve(); },
              selectTuplesAsync: (ids, opt) => { console.log('selectTuplesAsync', ids, opt); return Promise.resolve(); },
              getSelectedMarksAsync: () => Promise.resolve({ data: [] }),
              getVisualSpecificationAsync: () => Promise.resolve({
                activeMarksSpecificationIndex: 0,
                marksSpecifications: [{
                  encodings: [
                    { id: 'row', field: { name: 'Year' } },
                    { id: 'column', field: { name: 'Month' } },
                    { id: 'value', field: { name: 'Sales' } },
                  ],
                }],
              }),
              getSummaryDataReaderAsync: () => Promise.resolve({
                pageCount: 1,
                getPageAsync: () => Promise.resolve({ columns, data }),
                releaseAsync: () => Promise.resolve(),
              }),
            },
          },
        },
      };
    })();
  </script>
  <script src="./src/viz.js"></script>
</body>
</html>
